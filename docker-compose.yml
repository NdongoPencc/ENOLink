version: '3.9'

services:

  # ── Auth Service (port 8001) ─────────────────────────────────────────────
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - SECRET_KEY=auth-service-secret-key-enolink-2026
      - DEBUG=True
      - DB_ENGINE=django.db.backends.sqlite3
      - DB_NAME=db_auth.sqlite3
      - CORS_ALLOWED_ORIGINS=http://localhost:4200,http://localhost:8000
    volumes:
      - auth_data:/app
    command: >
      sh -c "python manage.py migrate &&
             python manage.py init_auth &&
             python manage.py runserver 0.0.0.0:8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/auth/login/"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Core Service (port 8002) ─────────────────────────────────────────────
  core-service:
    build:
      context: ./services/core-service
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    environment:
      - SECRET_KEY=auth-service-secret-key-enolink-2026
      - DEBUG=True
      - DB_ENGINE=django.db.backends.sqlite3
      - DB_NAME=db_core.sqlite3
      - AUTH_SERVICE_URL=http://auth-service:8001
      - CORS_ALLOWED_ORIGINS=http://localhost:4200,http://localhost:8000
    volumes:
      - core_data:/app
    depends_on:
      auth-service:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python manage.py init_db &&
             python manage.py runserver 0.0.0.0:8002"

  # ── CGA Service (port 8003) ──────────────────────────────────────────────
  cga-service:
    build:
      context: ./services/cga-service
      dockerfile: Dockerfile
    ports:
      - "8003:8003"
    environment:
      - SECRET_KEY=auth-service-secret-key-enolink-2026
      - DEBUG=True
      - AUTH_SERVICE_URL=http://auth-service:8001
      - CORE_SERVICE_URL=http://core-service:8002
    depends_on:
      auth-service:
        condition: service_healthy
    command: python manage.py runserver 0.0.0.0:8003

  # ── API Gateway (port 8000) ──────────────────────────────────────────────
  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - AUTH_SERVICE_URL=http://auth-service:8001
      - CORE_SERVICE_URL=http://core-service:8002
      - CORS_ALLOWED_ORIGINS=http://localhost:4200
    depends_on:
      - auth-service
      - core-service
    command: python manage.py runserver 0.0.0.0:8000

  # ── Frontend Angular (port 4200) ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - api-gateway

volumes:
  auth_data:
  core_data:
